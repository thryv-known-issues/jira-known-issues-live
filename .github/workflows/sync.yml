name: Sync Jira Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Jira issues
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          set -e
          echo "Fetching known client-impacting issues from Jira..."

          # Test auth
          TEST=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
            -H "Accept: application/json" \
            "https://thryv.atlassian.net/rest/api/3/myself")
          HTTP_CODE=$(echo "$TEST" | grep "HTTP_CODE:" | cut -d: -f2)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Auth failed! HTTP ${HTTP_CODE}"
            exit 1
          fi
          echo "Auth OK"

          ALL_ISSUES="[]"

          # Define queries — focused on techsupport labeled client-impacting issues
          QUERIES=(
            "project = MCB AND labels = techsupport AND status != Done ORDER BY priority ASC"
            "project = MCB AND labels = techsupport AND status = Done AND updated >= -30d ORDER BY updated DESC"
            "project = TPS AND labels = techsupport AND status != Done ORDER BY priority ASC"
            "project = TPS AND labels = techsupport AND status = Done AND updated >= -30d ORDER BY updated DESC"
            "project in (MC, MNY, TPAY) AND labels = techsupport AND status != Done ORDER BY priority ASC"
            "project in (MC, MNY, TPAY) AND labels = techsupport AND status = Done AND updated >= -30d ORDER BY updated DESC"
          )

          for JQL in "${QUERIES[@]}"; do
            echo ""
            echo "=== Query: ${JQL:0:80}... ==="
            NEXT_TOKEN=""

            while true; do
              if [ -z "$NEXT_TOKEN" ]; then
                RESPONSE=$(curl -s \
                  -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
                  -H "Accept: application/json" \
                  -G "https://thryv.atlassian.net/rest/api/3/search/jql" \
                  --data-urlencode "jql=${JQL}" \
                  --data-urlencode "fields=summary,status,priority,components,labels,created,updated,issuetype" \
                  --data-urlencode "maxResults=100")
              else
                RESPONSE=$(curl -s \
                  -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
                  -H "Accept: application/json" \
                  -G "https://thryv.atlassian.net/rest/api/3/search/jql" \
                  --data-urlencode "jql=${JQL}" \
                  --data-urlencode "fields=summary,status,priority,components,labels,created,updated,issuetype" \
                  --data-urlencode "maxResults=100" \
                  --data-urlencode "nextPageToken=${NEXT_TOKEN}")
              fi

              if ! echo "$RESPONSE" | jq -e '.issues' > /dev/null 2>&1; then
                echo "  No issues or error. First 300 chars:"
                echo "$RESPONSE" | head -c 300
                echo ""
                break
              fi

              COUNT=$(echo "$RESPONSE" | jq '.issues | length')
              echo "  Fetched ${COUNT} issues"

              if [ "$COUNT" -eq 0 ]; then break; fi

              BATCH=$(echo "$RESPONSE" | jq '[.issues[] | {
                key: .key,
                project: (.key | split("-")[0]),
                summary: (.fields.summary // ""),
                status: (.fields.status.name // ""),
                statusCategory: (.fields.status.statusCategory.name // "To Do"),
                priority: (.fields.priority.name // "P3"),
                components: [(.fields.components // [])[] | .name],
                labels: (.fields.labels // []),
                created: (.fields.created // ""),
                updated: (.fields.updated // ""),
                type: (.fields.issuetype.name // "")
              }]')

              ALL_ISSUES=$(echo "$ALL_ISSUES" "$BATCH" | jq -s '.[0] + .[1]')

              NEXT_TOKEN=$(echo "$RESPONSE" | jq -r '.nextPageToken // empty')
              if [ -z "$NEXT_TOKEN" ]; then break; fi
            done
          done

          # Deduplicate by key
          ALL_ISSUES=$(echo "$ALL_ISSUES" | jq '[group_by(.key)[] | .[0]]')

          TOTAL_COUNT=$(echo "$ALL_ISSUES" | jq 'length')
          echo ""
          echo "==============================="
          echo "Total unique issues: ${TOTAL_COUNT}"
          echo "==============================="

          echo "$ALL_ISSUES" | jq "{
            total: length,
            fetchedAt: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            projects: [\"MCB\",\"MC\",\"MNY\",\"TPAY\",\"TPS\"],
            issues: .
          }" > data.json

          echo "data.json written ($(wc -c < data.json) bytes)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync Jira data $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
