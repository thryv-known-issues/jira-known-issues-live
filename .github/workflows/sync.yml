name: Sync Jira Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Jira issues
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          set -e
          echo "Fetching known issues reported by ATS team..."

          TEST=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
            -H "Accept: application/json" \
            "https://thryv.atlassian.net/rest/api/3/myself")
          HTTP_CODE=$(echo "$TEST" | grep "HTTP_CODE:" | cut -d: -f2)
          if [ "$HTTP_CODE" != "200" ]; then echo "Auth failed!"; exit 1; fi
          echo "Auth OK"

          REPORTERS="62b21b5cb8e499e567e91be6,62b21f2567dff38e098787c4,62b21771dcafd965c5de0c22,62b2144e0c77011bdfdc8dd5,62b20c71b8e499e567e91379,62b21c5adcafd965c5de0edd,5f282db0bedd1000155357e8,62f4416f5111209f4fe0ff17,70121:54822783-467e-4f7b-bb2c-6d8fdd5e344e,62b21aaecebad33432f713a1,62b20b1284d73c720167a10c,62b21324f38b4dcf73d9393a,63bf451924db796721242be7"

          ALL_ISSUES="[]"

          QUERIES=(
            "project in (MCB, MC, MNY, TPAY, TPS) AND reporter in (${REPORTERS}) AND status != Done AND created >= 2026-01-01 ORDER BY priority ASC, created DESC"
            "project in (MCB, MC, MNY, TPAY, TPS) AND reporter in (${REPORTERS}) AND status = Done AND updated >= -30d AND created >= 2026-01-01 ORDER BY updated DESC"
          )

          QNUM=0
          for JQL in "${QUERIES[@]}"; do
            QNUM=$((QNUM + 1))
            echo ""
            echo "=== Query ${QNUM} ==="
            NEXT_TOKEN=""

            while true; do
              if [ -z "$NEXT_TOKEN" ]; then
                RESPONSE=$(curl -s \
                  -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
                  -H "Accept: application/json" \
                  -G "https://thryv.atlassian.net/rest/api/3/search/jql" \
                  --data-urlencode "jql=${JQL}" \
                  --data-urlencode "fields=summary,status,priority,components,labels,created,updated,issuetype,reporter" \
                  --data-urlencode "maxResults=100")
              else
                RESPONSE=$(curl -s \
                  -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
                  -H "Accept: application/json" \
                  -G "https://thryv.atlassian.net/rest/api/3/search/jql" \
                  --data-urlencode "jql=${JQL}" \
                  --data-urlencode "fields=summary,status,priority,components,labels,created,updated,issuetype,reporter" \
                  --data-urlencode "maxResults=100" \
                  --data-urlencode "nextPageToken=${NEXT_TOKEN}")
              fi

              if ! echo "$RESPONSE" | jq -e '.issues' > /dev/null 2>&1; then
                echo "  Error. First 400 chars:"
                echo "$RESPONSE" | head -c 400
                echo ""
                break
              fi

              COUNT=$(echo "$RESPONSE" | jq '.issues | length')
              echo "  Fetched ${COUNT} issues"
              if [ "$COUNT" -eq 0 ]; then break; fi

              BATCH=$(echo "$RESPONSE" | jq '[.issues[] | {
                key: .key,
                project: (.key | split("-")[0]),
                summary: (.fields.summary // ""),
                status: (.fields.status.name // ""),
                statusCategory: (.fields.status.statusCategory.name // "To Do"),
                priority: (.fields.priority.name // "P3"),
                components: [(.fields.components // [])[] | .name],
                labels: (.fields.labels // []),
                created: (.fields.created // ""),
                updated: (.fields.updated // ""),
                type: (.fields.issuetype.name // ""),
                reporter: (.fields.reporter.displayName // "")
              }]')

              ALL_ISSUES=$(echo "$ALL_ISSUES" "$BATCH" | jq -s '.[0] + .[1]')

              NEXT_TOKEN=$(echo "$RESPONSE" | jq -r '.nextPageToken // empty')
              if [ -z "$NEXT_TOKEN" ]; then break; fi

              CURRENT=$(echo "$ALL_ISSUES" | jq 'length')
              if [ "$CURRENT" -ge 2000 ]; then echo "  Hit cap."; break 2; fi
            done
          done

          ALL_ISSUES=$(echo "$ALL_ISSUES" | jq '[group_by(.key)[] | .[0]]')
          TOTAL_COUNT=$(echo "$ALL_ISSUES" | jq 'length')
          OPEN=$(echo "$ALL_ISSUES" | jq '[.[] | select(.statusCategory != "Done")] | length')
          DONE=$(echo "$ALL_ISSUES" | jq '[.[] | select(.statusCategory == "Done")] | length')
          echo ""
          echo "==============================="
          echo "Total: ${TOTAL_COUNT} (Open: ${OPEN}, Resolved: ${DONE})"
          echo "==============================="

          echo "$ALL_ISSUES" | jq "{
            total: length,
            fetchedAt: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            projects: [\"MCB\",\"MC\",\"MNY\",\"TPAY\",\"TPS\"],
            issues: .
          }" > data.json
          echo "data.json written ($(wc -c < data.json) bytes)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync Jira data $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
