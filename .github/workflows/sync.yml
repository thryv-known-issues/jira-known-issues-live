name: Sync Jira Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Jira issues
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          echo "Fetching issues from Jira..."

          ALL_ISSUES="[]"

          for PROJECT in MCB MC MNY TPAY TPS; do
            START=0
            TOTAL=999999

            while [ $START -lt $TOTAL ]; do
              JQL="project=${PROJECT} AND created >= 2026-01-01 ORDER BY created DESC"

              RESPONSE=$(curl -s --fail-with-body \
                -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
                -H "Accept: application/json" \
                --data-urlencode "jql=${JQL}" \
                --data-urlencode "fields=summary,status,priority,components,labels,created,updated,issuetype" \
                --data-urlencode "maxResults=100" \
                --data-urlencode "startAt=${START}" \
                -G "https://thryv.atlassian.net/rest/api/3/search")

              # Check if we got valid JSON
              if ! echo "$RESPONSE" | jq -e '.issues' > /dev/null 2>&1; then
                echo "  ${PROJECT}: API error or no issues field in response"
                echo "  Response: $(echo "$RESPONSE" | head -c 500)"
                break
              fi

              TOTAL=$(echo "$RESPONSE" | jq '.total // 0')
              COUNT=$(echo "$RESPONSE" | jq '.issues | length')

              echo "  ${PROJECT}: fetched ${COUNT} issues (startAt=${START}, total=${TOTAL})"

              if [ "$COUNT" -eq 0 ]; then
                break
              fi

              BATCH=$(echo "$RESPONSE" | jq '[.issues[] | {
                key: .key,
                project: (.key | split("-")[0]),
                summary: (.fields.summary // ""),
                status: (.fields.status.name // ""),
                statusCategory: (.fields.status.statusCategory.name // "To Do"),
                priority: (.fields.priority.name // "P3"),
                components: [(.fields.components // [])[] | .name],
                labels: (.fields.labels // []),
                created: (.fields.created // ""),
                updated: (.fields.updated // ""),
                type: (.fields.issuetype.name // "")
              }]')

              ALL_ISSUES=$(echo "$ALL_ISSUES" "$BATCH" | jq -s '.[0] + .[1]')

              START=$((START + 100))

              if [ $(echo "$ALL_ISSUES" | jq 'length') -ge 2000 ]; then
                echo "  Hit 2000 issue cap, stopping."
                break 2
              fi
            done
          done

          TOTAL_COUNT=$(echo "$ALL_ISSUES" | jq 'length')
          echo "Total issues fetched: ${TOTAL_COUNT}"

          echo "$ALL_ISSUES" | jq "{
            total: length,
            fetchedAt: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            since: \"2026-01-01\",
            projects: [\"MCB\",\"MC\",\"MNY\",\"TPAY\",\"TPS\"],
            issues: .
          }" > data.json

          echo "data.json written ($(wc -c < data.json) bytes)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync Jira data $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
