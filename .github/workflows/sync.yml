name: Sync Jira Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Jira issues
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          set -e
          echo "Fetching issues from Jira..."

          # Test auth
          echo "Testing Jira connection..."
          TEST=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
            -H "Accept: application/json" \
            "https://thryv.atlassian.net/rest/api/3/myself")
          HTTP_CODE=$(echo "$TEST" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "Auth test HTTP code: ${HTTP_CODE}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Auth failed!"
            echo "$TEST" | head -5
            exit 1
          fi
          echo "Auth OK!"

          ALL_ISSUES="[]"

          for PROJECT in MCB MC MNY TPAY TPS; do
            echo ""
            echo "=== Fetching ${PROJECT} ==="
            NEXT_TOKEN=""
            PAGE=0

            while true; do
              JQL="project=${PROJECT} AND created >= 2026-01-01 ORDER BY created DESC"

              if [ -z "$NEXT_TOKEN" ]; then
                RESPONSE=$(curl -s \
                  -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
                  -H "Accept: application/json" \
                  -G "https://thryv.atlassian.net/rest/api/3/search/jql" \
                  --data-urlencode "jql=${JQL}" \
                  --data-urlencode "fields=summary,status,priority,components,labels,created,updated,issuetype" \
                  --data-urlencode "maxResults=100")
              else
                RESPONSE=$(curl -s \
                  -u "${JIRA_EMAIL}:${JIRA_TOKEN}" \
                  -H "Accept: application/json" \
                  -G "https://thryv.atlassian.net/rest/api/3/search/jql" \
                  --data-urlencode "jql=${JQL}" \
                  --data-urlencode "fields=summary,status,priority,components,labels,created,updated,issuetype" \
                  --data-urlencode "maxResults=100" \
                  --data-urlencode "nextPageToken=${NEXT_TOKEN}")
              fi

              # Check if we got valid JSON with issues
              if ! echo "$RESPONSE" | jq -e '.issues' > /dev/null 2>&1; then
                echo "  ${PROJECT}: No issues field. First 400 chars:"
                echo "$RESPONSE" | head -c 400
                echo ""
                break
              fi

              COUNT=$(echo "$RESPONSE" | jq '.issues | length')
              TOTAL=$(echo "$RESPONSE" | jq '.total // "unknown"')
              PAGE=$((PAGE + 1))

              echo "  ${PROJECT}: page ${PAGE}, fetched ${COUNT} issues (total: ${TOTAL})"

              if [ "$COUNT" -eq 0 ]; then
                break
              fi

              BATCH=$(echo "$RESPONSE" | jq '[.issues[] | {
                key: .key,
                project: (.key | split("-")[0]),
                summary: (.fields.summary // ""),
                status: (.fields.status.name // ""),
                statusCategory: (.fields.status.statusCategory.name // "To Do"),
                priority: (.fields.priority.name // "P3"),
                components: [(.fields.components // [])[] | .name],
                labels: (.fields.labels // []),
                created: (.fields.created // ""),
                updated: (.fields.updated // ""),
                type: (.fields.issuetype.name // "")
              }]')

              ALL_ISSUES=$(echo "$ALL_ISSUES" "$BATCH" | jq -s '.[0] + .[1]')

              # Check for next page token
              NEXT_TOKEN=$(echo "$RESPONSE" | jq -r '.nextPageToken // empty')
              if [ -z "$NEXT_TOKEN" ]; then
                echo "  ${PROJECT}: no more pages"
                break
              fi

              CURRENT=$(echo "$ALL_ISSUES" | jq 'length')
              if [ "$CURRENT" -ge 2000 ]; then
                echo "  Hit 2000 issue cap, stopping."
                break 2
              fi
            done
          done

          TOTAL_COUNT=$(echo "$ALL_ISSUES" | jq 'length')
          echo ""
          echo "==============================="
          echo "Total issues fetched: ${TOTAL_COUNT}"
          echo "==============================="

          echo "$ALL_ISSUES" | jq "{
            total: length,
            fetchedAt: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            since: \"2026-01-01\",
            projects: [\"MCB\",\"MC\",\"MNY\",\"TPAY\",\"TPS\"],
            issues: .
          }" > data.json

          echo "data.json written ($(wc -c < data.json) bytes)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync Jira data $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
