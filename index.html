];
var LBL={'alpha template issue':'Alpha Template Issue (Missing / Update)','missing gp add on':'Missing GP Add-on \u2014 Not Appearing in MC','missing tl add on':'Missing TL Add On in MC','seo report link not available':'SEO Report Link Not Available','mc not installed':'MC Not Installed','mc updates not going to ginger':'MC Updates Not Going to Ginger / Gump','unable to publish listings':'Unable to Publish Listings','lm yext integration failures':'LM Yext Integration Failures','visitor tagging / heatmap analytics':'Website Analytics / Visitor Tagging Not Tracking','ep link / linkout issue':'EP Link Provisioning / Linkout Issue','yelp cpc fulfillment issue':'Yelp CPC Fulfillment Issue','manual yelp re-order request':'Manual Yelp Re-order Request','ep-ypo installation issues':'EP Not Auto-Enabling / GP Not Generating','qr code google reviews broken url':'QR Code Google Reviews \u2014 Broken URL','mcf upgrade failed':'MCF Upgrade Failed','tl report button greyed out':'TL Button Grayed Out / Report Unavailable','tl calls not injecting':'TL Calls Not Injecting to MC','gbp analytics not syncing':'GBP Analytics Not Syncing','lm & reputation failing to load':'LM & Reputation Failing to Load','raq issues':'Yelp RAQ Issues','ep status incorrect in gump':'EP Status Incorrect in GUMP','claim trackable phone number':'Unable to Claim Trackable Phone Number','ai score issues':'AI Score / Lead Insights Issues','o & o ctn reprovision':'O&O CTN Reprovision Request','cancel ctn request':'Cancel CTN Request','unable to update dn':'Unable to Update DN in MC'};

function gk(s){s=cln(s);s=s.replace(/\s*[-\u2013\u2014]\s*V\d+$/i,'');s=s.replace(/\s*V\d+$/i,'');s=s.replace(/\s*[-\u2013\u2014]\s*#?\d+$/,'');s=s.replace(/\s*\(.*?\)\s*$/,'');s=s.replace(/\s+/g,' ').trim().toLowerCase();for(var i=0;i<SYN.length;i++){var y=SYN[i];for(var j=0;j<y.p.length;j++){if(s.indexOf(y.p[j])===0||s===y.p[j])return y.k;}}return s;}

var ALL=[],activeTab='ALL',searches={},MT=2;

function buildG(issues){
  var m={};for(var i=0;i<issues.length;i++){var x=issues[i],k=gk(x.summary);if(!m[k])m[k]={issues:[],gk:k};m[k].issues.push(x);}
  var r=[];var ks=Object.keys(m);
  for(var ki=0;ki<ks.length;ki++){
    var g=m[ks[ki]];g.issues.sort(function(a,b){return new Date(b.created)-new Date(a.created);});
    var lt=g.issues[0],vs=[],pri=lt.priority;
    for(var vi=0;vi<g.issues.length;vi++){var vm=g.issues[vi].summary.match(/V(\d+)/i);if(vm)vs.push(parseInt(vm[1]));if((POR[g.issues[vi].priority]||9)<(POR[pri]||9))pri=g.issues[vi].priority;}
    var mV=vs.length?Math.max.apply(null,vs):0;
    var hIP=false,hTD=false;for(var si=0;si<g.issues.length;si++){var sc=g.issues[si].statusCategory;if(sc==='In Progress')hIP=true;if(sc==='To Do'||sc==='No Category')hTD=true;}
    var sC=hIP?'In Progress':hTD?'To Do':'Done';
    var co={},la={};for(var ci=0;ci<g.issues.length;ci++){var gi=g.issues[ci];for(var cc=0;cc<(gi.components||[]).length;cc++)co[gi.components[cc]]=1;for(var ll=0;ll<(gi.labels||[]).length;ll++)la[gi.labels[ll]]=1;}
    var lb=LBL[g.gk]||cln(lt.summary);
    var tA=0;for(var ai=0;ai<g.issues.length;ai++)tA+=(g.issues[ai].affectedAccounts||0);
    var br='';for(var bi=0;bi<g.issues.length;bi++){var b=g.issues[bi].brief||'';if(b.length>br.length)br=b;}
    r.push({id:lt.key,label:lb,brief:br,priority:pri,sC:sC,sL:lt.status,tickets:g.issues,count:g.issues.length,aa:tA,first:g.issues[g.issues.length-1].created,last:lt.updated,comps:Object.keys(co),labels:Object.keys(la),vM:mV,vC:vs.length});
  }
  r=r.filter(function(g){return g.count>=MT;});
  r.sort(function(a,b){var p=(POR[a.priority]||9)-(POR[b.priority]||9);return p!==0?p:(b.aa||b.count)-(a.aa||a.count);});
  return r;
}

function showS(t,m){var b=document.getElementById('sbar'),s=document.getElementById('spin'),g=document.getElementById('smsg');b.className='sb '+t;s.style.display=t==='loading'?'block':'none';g.textContent=m;if(t==='success')setTimeout(function(){b.className='sb';},4000);}

function load(){
  showS('loading','Loading known issues from Jira...');
  fetch(D+'?t='+Date.now()).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(d){
    ALL=(d.issues||[]).map(function(i){i.board=getBoard(i);i.product=clsProd(i);return i;});
    var t=d.fetchedAt?new Date(d.fetchedAt):new Date();
    document.getElementById('sync-time').textContent=t.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    document.getElementById('fdate').textContent='Data through '+ff(new Date());
    showS('success','Loaded '+ALL.length+' tickets from '+(d.projects||[]).join(', '));
    render();
  }).catch(function(e){showS('error','Failed \u2014 '+e.message);});
}

function render(){
  var open=ALL.filter(function(i){return i.statusCategory!=='Done';});
  var res=ALL.filter(function(i){return i.statusCategory==='Done';});
  var byP={};Object.keys(PRODS).forEach(function(p){byP[p]=ALL.filter(function(i){return i.product===p;});});
  var ipT=open.filter(function(i){return i.statusCategory==='In Progress';}).length;
  var blT=open.filter(function(i){return i.statusCategory==='To Do'||i.statusCategory==='No Category';}).length;
  var allG=buildG(open),allR=buildG(res),topG=allG[0];

  /* Alert */
  var al=document.getElementById('alert');
  if(topG&&(topG.priority==='P1'||topG.priority==='P2')){al.className='alert show';document.getElementById('atitle').textContent='\u26A0 Active alert: '+topG.label;document.getElementById('atext').textContent=(topG.aa?topG.aa+' affected accounts':topG.count+' tickets')+' \u00B7 '+topG.priority+' '+PLA[topG.priority]+' \u00B7 Status: '+topG.sL;}
  else if(topG){al.className='alert show';document.getElementById('atitle').textContent='Top issue: '+topG.label;document.getElementById('atext').textContent=(topG.aa?topG.aa+' affected accounts':topG.count+' tickets')+' \u00B7 '+topG.priority+' \u00B7 Status: '+topG.sL;}
  else al.className='alert';

  /* Summary cards */
  document.getElementById('sumrow').innerHTML='<div class="sc" data-t="ip"><div class="sc-h">In progress</div><div class="sc-x">'+ipT+' ticket'+(ipT!==1?'s':'')+' actively being worked across '+allG.filter(function(g){return g.sC==='In Progress';}).length+' known issues.'+(allG[0]?' Top: '+allG[0].label+'.':'')+'</div></div><div class="sc" data-t="bl"><div class="sc-h">Backlog</div><div class="sc-x">'+blT+' ticket'+(blT!==1?'s':'')+' in dev backlog across '+allG.filter(function(g){return g.sC==='To Do';}).length+' known issues.</div></div><div class="sc" data-t="rv"><div class="sc-h">Recently resolved</div><div class="sc-x">'+allR.length+' issue group'+(allR.length!==1?'s':'')+' resolved in the last 30 days ('+res.length+' tickets).</div></div>';

  /* Product health cards */
  document.getElementById('prodrow').innerHTML=Object.keys(PRODS).map(function(n){
    var s=PRODS[n],a=byP[n]||[],o=a.filter(function(i){return i.statusCategory!=='Done';}),rv=a.filter(function(i){return i.statusCategory==='Done';});
    var og=buildG(o),tA=og.reduce(function(s,g){return s+g.aa;},0);
    var h=o.length===0?['All clear','#4CAF50']:o.some(function(i){return i.priority==='P1';})?['Critical','#FF5000']:o.some(function(i){return i.priority==='P2';})?['Needs attention','#FF9800']:['Monitoring','#5378FC'];
    var td=trend14(a),rc=td.slice(7).reduce(function(a,b){return a+b;},0),pr=td.slice(0,7).reduce(function(a,b){return a+b;},0);
    var tdir=rc>pr?'<span style="color:#FF5000;font-weight:600;font-size:10px">&uarr; trending up</span>':rc<pr?'<span style="color:#4CAF50;font-weight:600;font-size:10px">&darr; improving</span>':'<span style="color:#808080;font-size:10px">&rarr; steady</span>';
    return'<div class="pc"><div class="pc-top"><span class="pc-nm">'+n+'</span><span class="pc-bg" style="background:'+h[1]+'15;color:'+h[1]+';border-color:'+h[1]+'40">'+h[0]+'</span></div><div class="pc-st"><div><div class="pc-n" style="color:'+s.a+'">'+og.length+'</div><div class="pc-l">known issues</div></div><div><div class="pc-n" style="color:#BA7517">'+o.length+'</div><div class="pc-l">open tickets</div></div><div><div class="pc-n" style="color:#FF5000">'+(tA||'\u2014')+'</div><div class="pc-l">affected accts</div></div></div><div style="border-top:1px solid #F4F6FB;padding-top:8px;margin-top:4px">'+spk(td,s.a)+'</div><div style="margin-top:4px">'+tdir+'</div></div>';
  }).join('');

  /* Board tabs */
  var boardData={};BOARDS.forEach(function(bd){boardData[bd.id]={open:[],res:[]};});
  open.forEach(function(i){if(boardData[i.board])boardData[i.board].open.push(i);else boardData['OTHER'].open.push(i);});
  res.forEach(function(i){if(boardData[i.board])boardData[i.board].res.push(i);else boardData['OTHER'].res.push(i);});

  var tabsHTML='<button class="tab'+(activeTab==='ALL'?' on':'')+'" onclick="setTab(\'ALL\')">All Boards<span class="cnt">'+allG.length+'</span></button>';
  BOARDS.forEach(function(bd){
    var g=buildG(boardData[bd.id].open);
    var total=boardData[bd.id].open.length+boardData[bd.id].res.length;
    if(total===0)return;
    var isOn=activeTab===bd.id;
    tabsHTML+='<button class="tab'+(isOn?' on':'')+'" onclick="setTab(\''+bd.id+'\')" style="'+(isOn?'border-bottom-color:'+bd.color+';color:'+bd.color:'')+'">'+bd.label+'<span class="cnt"'+(isOn?' style="background:'+bd.color+'"':'')+'>'+g.length+'</span></button>';
  });
  document.getElementById('tabs').innerHTML=tabsHTML;

  /* Panels */
  var panelsHTML='<div class="panel'+(activeTab==='ALL'?' on':'')+'" id="panel-ALL">'+renderBoard({id:'ALL',label:'All Boards',assignee:'',color:'#29355D',url:''},allG,allR,open)+'</div>';
  BOARDS.forEach(function(bd){
    var total=boardData[bd.id].open.length+boardData[bd.id].res.length;
    if(total===0)return;
    var g=buildG(boardData[bd.id].open),rg=buildG(boardData[bd.id].res);
    panelsHTML+='<div class="panel'+(activeTab===bd.id?' on':'')+'" id="panel-'+bd.id+'">'+renderBoard(bd,g,rg,boardData[bd.id].open)+'</div>';
  });
  document.getElementById('panels').innerHTML=panelsHTML;
}

function renderBoard(bd,groups,resGroups,openTickets){
  var h='',q=(searches[bd.id]||'').toLowerCase();
  var g=groups;
  if(q)g=g.filter(function(x){return x.label.toLowerCase().indexOf(q)>=0||(x.brief||'').toLowerCase().indexOf(q)>=0||x.tickets.some(function(t){return t.key.toLowerCase().indexOf(q)>=0||t.summary.toLowerCase().indexOf(q)>=0;});});

  var health=openTickets.length===0?['All clear','#4CAF50']:openTickets.some(function(i){return i.priority==='P1';})?['Critical','#FF5000']:openTickets.some(function(i){return i.priority==='P2';})?['Needs attention','#FF9800']:['Monitoring','#5378FC'];
  h+='<div class="bh"><div class="bh-left"><span class="bh-title">'+bd.label+'</span><span class="bh-badge" style="background:'+health[1]+'15;color:'+health[1]+';border-color:'+health[1]+'40">'+health[0]+'</span>'+(bd.assignee?'<span class="bh-assignee">Assignee: '+bd.assignee+'</span>':'')+(bd.url?'<a class="bh-jira" href="'+bd.url+'" target="_blank">Open in Jira &#8599;</a>':'')+'</div><div><input class="si" placeholder="Search issues..." value="'+(searches[bd.id]||'')+'" oninput="setSearch(\''+bd.id+'\',this.value)"></div></div>';

  var totalAccts=g.reduce(function(s,x){return s+x.aa;},0);
  h+='<div style="display:flex;gap:24px;margin-bottom:14px;font-size:12px;color:#808080"><span><strong style="color:#29355D;font-size:16px">'+g.length+'</strong> known issues</span><span><strong style="color:#BA7517;font-size:16px">'+openTickets.length+'</strong> open tickets</span>'+(totalAccts?'<span><strong style="color:#FF5000;font-size:16px">'+totalAccts+'</strong> affected accounts</span>':'')+'</div>';

  if(g.length===0){h+='<div class="em">'+(q?'No issues match your search.':'No known issues with 2+ tickets on this board.')+'</div>';}
  else{
    h+='<div class="tw"><table><thead><tr><th style="width:44%">Issue</th><th style="width:7%">Priority</th><th style="width:11%">Affected</th><th style="width:12%">Status</th><th style="width:8%">Reported</th><th style="width:5%">Age</th></tr></thead><tbody>';
    g.forEach(function(x){
      var ks=x.tickets.map(function(t){return'<a href="https://thryv.atlassian.net/browse/'+t.key+'" target="_blank">'+t.key+'</a>';}).join(' ');
      var bh=x.brief?'<div class="ti-br">'+x.brief+'</div>':'';
      var ac=x.aa>0?'<div class="ta">'+x.aa+'</div><div class="ta-l">affected accounts</div><div class="ta-s">'+x.count+' tickets</div>':'<div class="ta" style="color:#4D4D4D">'+x.count+'</div><div class="ta-l">open tickets</div>';
      h+='<tr><td class="ti"><div class="ti-nm">'+x.label+'</div>'+bh+'<div class="ti-ks">'+ks+'</div></td><td>'+pl(x.priority,PCL[x.priority]||'p-p3')+'</td><td>'+ac+'</td><td>'+pl(x.sL,stP(x.sC))+'</td><td style="font-size:11px;color:#808080;white-space:nowrap">'+fd(x.first)+'</td><td style="font-size:11px;color:#808080;white-space:nowrap">'+da(x.first)+'d</td></tr>';
    });
    h+='</tbody></table></div>';
  }

  /* Incident */
  var top=g[0];
  if(top&&(top.priority==='P1'||top.priority==='P2'||top.aa>=5||top.count>=3)){
    var sev=top.priority==='P1'?'Critical \u2014 Severe disruption':top.priority==='P2'?'High \u2014 Major function down for subset':'Medium \u2014 Moderate impact';
    var imp=top.brief||top.label;if(top.aa)imp+=' '+top.aa+' client accounts reported as affected.';imp+=' '+(top.comps.length?'Components: '+top.comps.join(', ')+'.':'')+' Reported '+top.count+' time'+(top.count>1?'s':'')+' since '+fd(top.first)+'. Status: "'+top.sL+'".';
    h+='<div class="inc"><div class="inc-h"><span class="inc-i">\u26A0</span><span class="inc-t">Incident Communication \u2014 '+top.label+'</span></div><div class="inc-g"><span class="inc-lb">Priority:</span><span class="inc-v">'+pl(top.priority,PCL[top.priority])+' '+PLA[top.priority]+'</span><span class="inc-lb">Severity:</span><span class="inc-v">'+sev+'</span><span class="inc-lb">Status:</span><span class="inc-v">'+top.sL+'</span><span class="inc-lb">Tickets:</span><span class="inc-v">'+top.count+(top.vC>=2?' (V'+top.vM+')':'')+'</span>'+(top.aa?'<span class="inc-lb">Affected:</span><span class="inc-v" style="color:#FF5000;font-weight:700">'+top.aa+' accounts</span>':'')+'<span class="inc-lb">Reported:</span><span class="inc-v">'+fd(top.first)+' ('+da(top.first)+' days ago)</span></div><div class="inc-s"><div class="inc-st">Impact summary</div><div class="inc-sx">'+imp+'</div></div><div class="inc-s"><div class="inc-st">Client-facing message</div><div class="inc-sx">"We\'re aware of a technical issue. Your subscription is active and no data has been lost. Our engineering team has prioritized this. We\'ll follow up once resolved."</div></div><div class="inc-s"><div class="inc-st">Internal notes</div><div class="inc-sx">Latest ticket: <a href="https://thryv.atlassian.net/browse/'+top.id+'" target="_blank">'+top.id+'</a>. '+top.count+' reports. '+(top.vC>=2?'Across '+top.vC+' versions (V'+top.vM+'). ':'')+'Submit new occurrences as additional tickets.</div></div></div>';
  }

  /* Resolved */
  if(resGroups.length>0){
    var rs=resGroups.slice(0,5);
    h+='<div class="sh" style="margin-top:4px"><span class="stt">Recently Resolved</span><span class="sn">'+resGroups.length+'</span></div>';
    rs.forEach(function(g){var d=Math.max(1,Math.round((new Date(g.last)-new Date(g.first))/864e5));h+='<div class="rr"><span class="rk">'+g.id+'</span><span class="rs">'+g.label+(g.aa?' ('+g.aa+' accounts)':'')+'</span><span class="rd">Resolved in '+d+'d</span></div>';});
  }
  return h;
}

function setTab(id){activeTab=id;render();}
function setSearch(bid,v){searches[bid]=v;render();}
function doLookup(){
  var v=document.getElementById('lin').value.trim(),el=document.getElementById('lout');
  if(v.length<2){el.innerHTML='';return;}
  var q=v.toLowerCase(),h=null;
  for(var i=0;i<ALL.length;i++){if(ALL[i].key.toLowerCase().indexOf(q)>=0||ALL[i].summary.toLowerCase().indexOf(q)>=0){h=ALL[i];break;}}
  if(h){var bd=BOARDS.find(function(b){return b.id===h.board;})||{label:'Other'};el.innerHTML='<div class="lk-o"><span class="k">'+h.key+'</span>'+pl(h.priority,PCL[h.priority]||'p-p3')+'<span style="font-size:10px;color:#808080;border:1px solid #ECEEF1;padding:1px 8px;border-radius:100px">'+bd.label+'</span><span class="s">'+cln(h.summary)+'</span><a href="https://thryv.atlassian.net/browse/'+h.key+'" target="_blank">Jira \u2197</a></div>';}
  else el.innerHTML='<span style="font-size:11px;color:#808080">No match</span>';
}
load();
</script>
