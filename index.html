<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>thryv ▸ Known Issues Jira Status Page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* =========================================================
   THRYV KNOWN ISSUES — DESIGN TOKENS
   ========================================================= */
:root {
  /* Thryv brand */
  --orange: #FF5000;
  --orange-soft: #FFE9DD;
  --midnight: #29355D;
  --midnight-soft: #DDE2EE;
  --black: #121212;
  --white: #FFFFFF;
  --mist: #F4F6FB;
  --cloud: #ECEEF1;
  --steel: #808080;
  --night: #4D4D4D;
  --sapphire: #5378FC;
  --sapphire-soft: #E3EAFE;

  /* Product pills */
  --mc-bg: #3C3489;
  --mc-fg: #FFFFFF;
  --mc-soft: #E8E5F5;
  --ol-bg: #29355D;
  --ol-fg: #FFFFFF;
  --ol-soft: #DDE2EE;
  --tp-bg: #5378FC;
  --tp-fg: #FFFFFF;
  --tp-soft: #E3EAFE;

  /* Status semantics */
  --todo-bg: #E3EAFE;
  --todo-fg: #2E4BC4;
  --prog-bg: #FFF3D6;
  --prog-fg: #8A5A00;
  --done-bg: #D9F2E2;
  --done-fg: #0E6B2E;

  /* Health */
  --health-critical: #D93025;
  --health-attention: #E37400;
  --health-monitor: #1A73E8;
  --health-clear: #1E8E3E;

  /* Surface */
  --bg: #F4F6FB;
  --surface: #FFFFFF;
  --border: #ECEEF1;
  --border-strong: #D8DCE6;
  --text: #121212;
  --text-muted: #4D4D4D;
  --text-faint: #808080;

  /* Shape */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;
  --shadow-sm: 0 1px 2px rgba(18, 18, 18, 0.04);
  --shadow-md: 0 4px 12px rgba(41, 53, 93, 0.06);
  --shadow-lg: 0 12px 32px rgba(41, 53, 93, 0.08);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings: 'ss01' on, 'ss02' on;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font-family: inherit; cursor: pointer; }
a { color: inherit; }
.mono { font-family: 'DM Mono', ui-monospace, monospace; }

/* =========================================================
   TOP NAV
   ========================================================= */
.nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  --nav-height: 57px;
}
.nav-inner {
  max-width: 1440px;
  margin: 0 auto;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 28px; height: 28px;
  background: var(--orange);
  border-radius: 7px;
  display: grid;
  place-items: center;
  color: var(--white);
  font-weight: 800;
  font-size: 14px;
  line-height: 1;
}
.brand-text { color: var(--midnight); }
.brand-text .sep { color: var(--steel); margin: 0 6px; font-weight: 400; }
.brand-text .title { color: var(--black); }

.nav-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.last-sync {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.last-sync .dot {
  width: 7px; height: 7px;
  background: var(--health-clear);
  border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(30, 142, 62, 0.15);
}
.btn-refresh {
  background: var(--midnight);
  color: var(--white);
  border: 0;
  padding: 8px 14px;
  border-radius: var(--r-md);
  font-size: 13px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 0.15s ease;
}
.btn-refresh:hover { background: #1f2a4a; }
.btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* =========================================================
   LAYOUT
   ========================================================= */
.shell {
  max-width: 1440px;
  margin: 0 auto;
  padding: 24px;
}
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--black);
  margin: 0;
}
.page-subtitle {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 4px;
}
.search-wrap {
  flex: 1 1 320px;
  max-width: 460px;
  position: relative;
}
.search-input {
  width: 100%;
  background: var(--white);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-md);
  padding: 10px 14px 10px 38px;
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input:focus {
  outline: 0;
  border-color: var(--midnight);
  box-shadow: 0 0 0 3px var(--midnight-soft);
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--steel);
  pointer-events: none;
}
.search-results {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--white);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-lg);
  max-height: 360px;
  overflow-y: auto;
  z-index: 50;
  display: none;
}
.search-results.show { display: block; }
.search-result {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: 13px;
}
.search-result:hover { background: var(--mist); }
.search-result:last-child { border-bottom: 0; }
.search-result .sr-key { color: var(--sapphire); font-weight: 500; font-size: 11px; }
.search-result .sr-summary { color: var(--text); margin-top: 2px; }
.search-result .sr-meta { color: var(--text-faint); font-size: 11px; margin-top: 2px; }

/* =========================================================
   HEALTH CARDS (Product)
   ========================================================= */
.product-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}
.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.product-card .strip {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.product-card.mc .strip { background: var(--mc-bg); }
.product-card.ol .strip { background: var(--ol-bg); }
.product-card.tp .strip { background: var(--tp-bg); }

.pc-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.pc-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.005em;
}
.pc-badge {
  font-size: 10.5px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.pc-badge.critical { background: rgba(217, 48, 37, 0.1); color: var(--health-critical); }
.pc-badge.attention { background: rgba(227, 116, 0, 0.1); color: var(--health-attention); }
.pc-badge.monitor { background: rgba(26, 115, 232, 0.1); color: var(--health-monitor); }
.pc-badge.clear { background: rgba(30, 142, 62, 0.1); color: var(--health-clear); }

.pc-metric {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 4px;
}
.pc-big {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--black);
  line-height: 1;
}
.pc-label {
  font-size: 11.5px;
  color: var(--text-muted);
}
.pc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.pc-stat {
  font-size: 11.5px;
  color: var(--text-muted);
}
.pc-stat strong {
  color: var(--text);
  font-weight: 600;
  font-size: 13px;
  display: block;
  margin-top: 1px;
}
.pc-spark {
  width: 80px;
  height: 28px;
}

/* =========================================================
   SUMMARY CARDS (In Progress / Backlog / Resolved)
   ========================================================= */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.summary-icon {
  width: 44px; height: 44px;
  border-radius: var(--r-md);
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
.summary-icon.prog { background: var(--prog-bg); color: var(--prog-fg); }
.summary-icon.todo { background: var(--todo-bg); color: var(--todo-fg); }
.summary-icon.done { background: var(--done-bg); color: var(--done-fg); }
.summary-content { flex: 1; min-width: 0; }
.summary-content .sc-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}
.summary-content .sc-num {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--black);
}
.summary-content .sc-sub {
  font-size: 11.5px;
  color: var(--text-faint);
  margin-top: 2px;
}

/* =========================================================
   BOARD TABS
   ========================================================= */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 6px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  background: transparent;
  border: 0;
  padding: 8px 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.tab:hover { background: var(--mist); color: var(--text); }
.tab.active {
  background: var(--midnight);
  color: var(--white);
}
.tab .count {
  background: rgba(0, 0, 0, 0.08);
  color: inherit;
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 999px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.tab.active .count {
  background: rgba(255, 255, 255, 0.18);
}

/* =========================================================
   BOARD HEADER
   ========================================================= */
.board-head {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 22px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.bh-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.bh-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--black);
  margin: 0;
}
.bh-meta {
  display: flex;
  gap: 14px;
  font-size: 12px;
  color: var(--text-muted);
  align-items: center;
}
.bh-meta .divider { color: var(--cloud); }
.bh-meta strong { color: var(--text); font-weight: 600; }
.btn-jira {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--midnight-soft);
  color: var(--midnight);
  border: 0;
  padding: 8px 14px;
  border-radius: var(--r-md);
  font-size: 12.5px;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.15s;
}
.btn-jira:hover { background: #c8d0e3; }

/* =========================================================
   INCIDENT BLOCK
   ========================================================= */
.incident {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 0;
  margin-bottom: 16px;
  overflow: hidden;
}
.incident-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: linear-gradient(135deg, #FFF7F2 0%, #FFEDE0 100%);
  border-bottom: 1px solid #FFD9BF;
}
.incident-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--midnight);
}
.incident-title svg { color: var(--orange); }
.btn-copy {
  background: var(--white);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 6px 12px;
  border-radius: var(--r-sm);
  font-size: 12px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 0.15s;
}
.btn-copy:hover { background: var(--mist); }
.btn-copy.copied { background: var(--done-bg); color: var(--done-fg); border-color: var(--done-fg); }
.incident-body {
  padding: 18px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.incident-col h4 {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin: 0 0 8px;
}
.incident-col p {
  margin: 0;
  font-size: 13px;
  line-height: 1.55;
  color: var(--text);
  white-space: pre-wrap;
}
.incident-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.incident-meta .im-item {
  background: var(--mist);
  padding: 8px 12px;
  border-radius: var(--r-sm);
}
.incident-meta .im-label {
  font-size: 10.5px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.incident-meta .im-val {
  font-size: 13px;
  color: var(--text);
  font-weight: 600;
  margin-top: 2px;
}

/* =========================================================
   ISSUE TABLE
   ========================================================= */
.issues-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  margin-bottom: 24px;
}
.issues-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.issues-head h3 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.issues-head .threshold-note {
  font-size: 11.5px;
  color: var(--text-faint);
}
.issues-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}
.issues-table thead th {
  background: var(--mist);
  text-align: left;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 57px;
  z-index: 20;
}
/* First/last th — round to match parent card edge */
.issues-table thead th:first-child { border-top-left-radius: 0; }
.issues-table thead th:last-child { border-top-right-radius: 0; }
.issues-table thead th::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 1px;
  background: var(--border);
}
.issues-table tbody tr {
  transition: background 0.1s;
}
.issues-table tbody tr:hover { background: var(--mist); }
.issues-table td {
  padding: 14px 16px;
  vertical-align: top;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.issues-table tbody tr:last-child td { border-bottom: 0; }
.issue-name {
  font-weight: 600;
  color: var(--black);
  letter-spacing: -0.005em;
  line-height: 1.4;
}
.issue-brief {
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 4px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.issue-keys {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 6px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.issue-key-pill {
  background: var(--sapphire-soft);
  color: var(--sapphire);
  padding: 3px 8px;
  border-radius: 4px;
  text-decoration: none;
  font-family: 'DM Mono', monospace;
  font-size: 10.5px;
  font-weight: 600;
  border: 1px solid transparent;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all 0.12s ease;
  cursor: pointer;
}
.issue-key-pill::after {
  content: '↗';
  font-size: 9px;
  opacity: 0.6;
}
.issue-key-pill:hover {
  background: var(--sapphire);
  color: var(--white);
  border-color: var(--sapphire);
  transform: translateY(-1px);
}
.issue-key-pill:hover::after {
  opacity: 1;
}
.issue-key-more {
  background: var(--cloud);
  color: var(--text-muted);
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10.5px;
  font-weight: 600;
}

/* Product pills */
.prod-pill {
  display: inline-flex;
  align-items: center;
  font-size: 10.5px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.prod-pill.mc { background: var(--mc-soft); color: var(--mc-bg); }
.prod-pill.ol { background: var(--ol-soft); color: var(--ol-bg); }
.prod-pill.tp { background: var(--tp-soft); color: var(--tp-bg); }
.prod-pill.other { background: var(--cloud); color: var(--night); }

/* Status pills */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 999px;
  white-space: nowrap;
}
.status-pill::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.status-pill.p-todo { background: var(--todo-bg); color: var(--todo-fg); }
.status-pill.p-prog { background: var(--prog-bg); color: var(--prog-fg); }
.status-pill.p-done { background: var(--done-bg); color: var(--done-fg); }

.affected-num {
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.affected-label {
  font-size: 10.5px;
  color: var(--text-faint);
  margin-top: 2px;
}
.ticket-count {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  color: var(--text);
}
.age-cell {
  font-variant-numeric: tabular-nums;
  color: var(--text-muted);
  font-size: 12px;
}

/* Empty state */
.empty {
  padding: 48px 20px;
  text-align: center;
  color: var(--text-faint);
}
.empty svg { color: var(--cloud); margin-bottom: 12px; }
.empty .e-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.empty .e-sub { font-size: 12px; }

/* =========================================================
   RECENTLY RESOLVED
   ========================================================= */
.resolved-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 24px;
}
.resolved-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
  padding: 16px 20px;
}
.resolved-item {
  background: var(--mist);
  border-radius: var(--r-md);
  padding: 12px;
  border-left: 3px solid var(--health-clear);
}
.resolved-item .ri-name {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.4;
}
.resolved-item .ri-meta {
  font-size: 11px;
  color: var(--text-faint);
  display: flex;

/* =========================================================

/* Left-edge stripe on issue rows */

}

/* Hover hint */

/* =========================================================

}

/* =========================================================
   STAGGERED FADE-IN ON LOAD
   ========================================================= */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up {
  animation: fadeUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}
.fade-up-1 { animation-delay: 0ms; }
.fade-up-2 { animation-delay: 60ms; }
.fade-up-3 { animation-delay: 120ms; }
.fade-up-4 { animation-delay: 180ms; }
.fade-up-5 { animation-delay: 240ms; }
.fade-up-6 { animation-delay: 300ms; }

/* =========================================================
   BACK-TO-TOP BUTTON
   ========================================================= */
.scroll-top {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--midnight);

<script>
/* =========================================================
   THRYV KNOWN ISSUES — APP LOGIC
   ========================================================= */

// ---------------------------------------------------------
// BOARD CONFIGURATION
// ---------------------------------------------------------
const BOARDS = [
  {
    id: 'all',
    label: 'All Boards',
    short: 'All',
    jiraUrl: 'https://thryv.atlassian.net/jira/your-work',
    assignee: 'ATS Team',
    match: () => true
  },
  {
    id: 'mcb',
    label: 'MC Bugs',
    short: 'MCB',
    jiraUrl: 'https://thryv.atlassian.net/jira/software/c/projects/MCB/boards/3783',
    assignee: 'ATS Team',
    match: t => (t.project === 'MCB' || t.project === 'MC') && !isSEO(t)
  },
  {
    id: 'mcbase',
    label: 'MC Base',
    short: 'MC Base',
    jiraUrl: 'https://thryv.atlassian.net/jira/software/c/projects/TP/boards/4986',
    assignee: 'Tyler Foreman',
    match: t => t.project === 'TP' && !isListings(t)
  },
  {
    id: 'listings',
    label: 'Listings',
    short: 'Listings',
    jiraUrl: 'https://thryv.atlassian.net/jira/software/c/projects/TP/boards/4988',
    assignee: 'Tyler Foreman',
    match: t => t.project === 'TP' && isListings(t)
  },
  {
    id: 'leads',
    label: 'TL + LL',
    short: 'TL+LL',
    jiraUrl: 'https://thryv.atlassian.net/jira/software/c/projects/LEADS/boards/4962',
    assignee: 'Divya Kumari',
    match: t => t.project === 'LEADS'
  },
  {
    id: 'seo',
    label: 'SEO',
    short: 'SEO',
    jiraUrl: 'https://thryv.atlassian.net/jira/software/c/projects/SEO/boards/4966',
    assignee: 'Tyler Foreman',
    match: t => t.project === 'SEO' || isSEO(t)
  },
  {
    id: 'oo',
    label: 'O&O',
    short: 'O&O',
    jiraUrl: 'https://thryv.atlassian.net/jira/software/c/projects/CCPT',
    assignee: 'Matthew Schnell',
    match: t => t.project === 'CCPT' || /o\s*&\s*o|o\s+and\s+o/i.test(t.summary || '')
  },
  {
    id: 'other',
    label: 'Other',
    short: 'Other',
    jiraUrl: 'https://thryv.atlassian.net/jira/your-work',
    assignee: '—',
    match: t => !['MCB','MC','TP','LEADS','SEO','CCPT'].includes(t.project) && !/o\s*&\s*o/i.test(t.summary || '')
  }
];

function isSEO(t) {
  const s = (t.summary || '').toLowerCase();
  const c = (t.components || []).join(' ').toLowerCase();
  // Don't classify "SEO" mentioned in passing — must be a clearly SEO-focused ticket
  return c.includes('seo') || /alpha template|seo report|missing alpha/i.test(s);
}

const LISTINGS_KEYWORDS = [
  'raq','update failed','ep linkout','gump','ypo','yext','listings',
  'enhanced profile','publisher','reputation','lm '
];
function isListings(t) {
  const s = (t.summary || '').toLowerCase();
  const c = (t.components || []).join(' ').toLowerCase();
  return LISTINGS_KEYWORDS.some(k => s.includes(k) || c.includes(k));
}

// ---------------------------------------------------------
// SYNONYM MAP — groups related summaries into single issues
// ---------------------------------------------------------
const SYNONYM_GROUPS = [
  { canonical: 'Alpha template issue', patterns: ['alpha template','missing alpha','template missing in alpha','update alpha template'] },
  { canonical: 'Missing GP Add On', patterns: ['missing gp add','gp fulfillment','gp stats','gp not generating'] },
  { canonical: 'Missing TL Add On', patterns: ['missing tl add','remove tl add','tl not installed'] },
  { canonical: 'SEO report link not available', patterns: ['seo report','seo reporting'] },
  { canonical: 'MC not installed', patterns: ['mc not installed','mc reinstall','mc not connected'] },
  { canonical: 'MC updates not going to Ginger', patterns: ['mc updates not going','mc geo updates','mc updates partially','rpp ctn missing in gump','aus gump distribution'] },
  { canonical: 'Unable to publish listings', patterns: ['unable to publish','unable to confirm/publish','unable to publish and update'] },
  { canonical: 'LM/Yext integration failures', patterns: ['lm yext','listings fails existing yext','lm duplicate yext','lm not syncing','active yext disconnected'] },
  { canonical: 'Visitor tagging / Heatmap analytics', patterns: ['visitor tagging','heatmap','website analytics'] },
  { canonical: 'EP link / linkout issue', patterns: ['ep link','ep linkout','yelp ep','yahoo ep'] },
  { canonical: 'Yelp CPC fulfillment issue', patterns: ['yelp cpc','yelp fulfillment'] },
  { canonical: 'Manual Yelp re-order request', patterns: ['yelp re-order','yelp reorder'] },
  { canonical: 'EP-YPO installation issues', patterns: ['ep-ypo','enhanced profiles not auto','ypo install'] },
  { canonical: 'QR code Google reviews broken URL', patterns: ['qr code','google reviews broken'] },
  { canonical: 'MCF upgrade failed', patterns: ['mcf upgrade','mcf to mcplus','mcf to mcpro'] },
  { canonical: 'O&O CTN reprovision', patterns: ['o & o ctn','o&o ctn','o and o ctn'] },
  { canonical: 'Unable to update DN', patterns: ['unable to update dn','update dn'] },
  { canonical: 'TL report button greyed out', patterns: ['tl report button','thryv leads button','tl button gray','tl button grey'] },
  { canonical: 'TL calls not injecting', patterns: ['tl calls not','eligible tl calls'] },
  { canonical: 'GBP analytics not syncing', patterns: ['gbp analytics','ep analytics not flowing'] },
  { canonical: 'LM & Reputation failing to load', patterns: ['lm & reputation','lm not loading','reputation failing'] },
  { canonical: 'RAQ issues', patterns: ['raq issue','yelp raq','raq '] },
  { canonical: 'EP status incorrect in Gump', patterns: ['ep status incorrect','gump status not aligned','ep not getting disabled'] },
  { canonical: 'Claim trackable phone number', patterns: ['claim trackable','claim phone'] },
  { canonical: 'AI Score issues', patterns: ['ai score','ai lead insights','ai scoring'] },
  { canonical: 'Cancel CTN request', patterns: ['cancel ctn'] }
];

function canonicalize(summary) {
  const s = (summary || '').toLowerCase();
  for (const g of SYNONYM_GROUPS) {
    if (g.patterns.some(p => s.includes(p))) return g.canonical;
  }
  // fallback: strip common prefixes / version suffixes
  return (summary || '')
    .replace(/\s+v\d+(\.\d+)?$/i, '')
    .replace(/^\[.*?\]\s*/, '')
    .trim();
}

// ---------------------------------------------------------
// PRODUCT CLASSIFICATION
// ---------------------------------------------------------
function classifyProduct(t) {
  const s = (t.summary || '').toLowerCase();
  const c = (t.components || []).join(' ').toLowerCase();
  const all = s + ' ' + c;

  if (/thryvpay|stripe|payment|payout|invoice payment/.test(all)) return 'tp';
  if (t.project === 'LEADS' || /listings|yext|gump|ypo|raq|publisher|enhanced profile|gbp|yelp|reputation|lm /.test(all)) return 'ol';
  if (t.project === 'TP' && /listings|yext|gump|ypo|raq/.test(all)) return 'ol';
  return 'mc';
}

const PRODUCT_LABELS = {
  mc: 'Marketing Center',
  ol: 'Online Listings',
  tp: 'ThryvPay',
  other: 'Other'
};

// ---------------------------------------------------------
// STATUS CATEGORY MAPPING
// ---------------------------------------------------------
function statusPillClass(category) {
  const c = (category || '').toLowerCase();
  if (c.includes('done')) return 'p-done';
  if (c.includes('progress')) return 'p-prog';
  return 'p-todo'; // To Do, No Category, Blocked, etc.
}

// ---------------------------------------------------------
// STATE
// ---------------------------------------------------------
let rawData = null;
let groupedIssues = []; // { canonical, tickets: [...], product, affectedAccounts, ... }
let activeTab = 'all';

// ---------------------------------------------------------
// LOAD
// ---------------------------------------------------------
async function loadData(forceFresh = false) {
  const url = forceFresh ? `data.json?t=${Date.now()}` : 'data.json';
  try {
    const res = await fetch(url, { cache: forceFresh ? 'no-store' : 'default' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    rawData = await res.json();
    process();
    render();
    updateLastSync();
  } catch (err) {
    console.error('Failed to load data.json', err);
    document.getElementById('loader').innerHTML = `
      <div style="color:var(--health-critical);font-weight:600;margin-bottom:6px;">Could not load data.json</div>
      <div style="font-size:12px;">${err.message}</div>
    `;
  }
}

// ---------------------------------------------------------
// TIMESTAMP HELPERS — all timestamps shown in CST (America/Chicago)
// ---------------------------------------------------------
function formatCST(input, opts = {}) {
  if (!input) return '—';
  const d = input instanceof Date ? input : new Date(input);
  if (isNaN(d.getTime())) return '—';
  const defaults = {
    timeZone: 'America/Chicago',
    year: 'numeric', month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit',
    hour12: true
  };
  return d.toLocaleString('en-US', { ...defaults, ...opts }) + ' CST';
}

function formatCSTShort(input) {
  if (!input) return '—';
  const d = input instanceof Date ? input : new Date(input);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleString('en-US', {
    timeZone: 'America/Chicago',
    month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit',
    hour12: true
  }) + ' CST';
}

function updateLastSync() {
  const el = document.getElementById('lastSync');
  const ts = rawData && (rawData.fetchedAt || rawData.lastSync);
  if (!ts) {
    el.querySelector('span:last-child').textContent = 'No sync data';
    return;
  }
  const d = new Date(ts);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  let rel;
  if (mins < 1) rel = 'just now';
  else if (mins < 60) rel = `${mins}m ago`;
  else if (mins < 1440) rel = `${Math.floor(mins/60)}h ago`;
  else rel = `${Math.floor(mins/1440)}d ago`;
  el.querySelector('span:last-child').textContent = `Synced ${rel} · ${formatCSTShort(d)}`;
  el.title = `Last sync: ${formatCST(d)}`;
}

// ---------------------------------------------------------
// PROCESS — group tickets, compute aggregates
// ---------------------------------------------------------
function process() {
  const items = rawData && (rawData.issues || rawData.tickets);
  if (!items || !items.length) {
    groupedIssues = [];
    return;
  }
  const groups = new Map();
  for (const t of items) {
    const canonical = canonicalize(t.summary);
    if (!groups.has(canonical)) {
      groups.set(canonical, {
        canonical,
        tickets: [],
        brief: t.brief || '',
        product: classifyProduct(t),
        affectedAccounts: 0
      });
    }
    const g = groups.get(canonical);
    g.tickets.push(t);
    g.affectedAccounts += (t.affectedAccounts || 0);
    if (!g.brief && t.brief) g.brief = t.brief;
  }
  groupedIssues = Array.from(groups.values());
  // sort: affected accounts desc, then ticket count desc
  groupedIssues.sort((a, b) => {
    if (b.affectedAccounts !== a.affectedAccounts) return b.affectedAccounts - a.affectedAccounts;
    return b.tickets.length - a.tickets.length;
  });
}

// ---------------------------------------------------------
// HELPERS
// ---------------------------------------------------------
function isOpen(t) {
  const cat = (t.statusCategory || '').toLowerCase();
  return !cat.includes('done');
}
function ageDays(t) {
  if (!t.created) return null;
  const created = new Date(t.created);
  return Math.floor((Date.now() - created.getTime()) / 86400000);
}
function topStatusForGroup(g) {
  const open = g.tickets.filter(isOpen);
  if (open.length === 0) return { name: 'Resolved', category: 'Done' };
  // pick highest-priority status in progress
  const inProg = open.find(t => (t.statusCategory || '').toLowerCase().includes('progress'));
  if (inProg) return { name: inProg.status, category: inProg.statusCategory };
  return { name: open[0].status || 'Open', category: open[0].statusCategory || 'To Do' };
}
function avgAge(g) {
  const ages = g.tickets.map(ageDays).filter(a => a !== null);
  if (!ages.length) return null;
  return Math.round(ages.reduce((s,a)=>s+a,0) / ages.length);
}
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function tagForKey(key) {
  return `https://thryv.atlassian.net/browse/${key}`;
}

// ---------------------------------------------------------
// RENDER
// ---------------------------------------------------------
function render() {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  renderProductCards();
  renderSummaryCards();
  renderTabs();
  renderBoard();
}

function renderProductCards() {
  const products = ['mc', 'ol', 'tp'];
  const html = products.map((p, idx) => {
    const groups = groupedIssues.filter(g => g.product === p && g.tickets.length >= 2 && g.tickets.some(isOpen));
    const knownIssues = groups.length;
    const openTickets = groups.reduce((s,g) => s + g.tickets.filter(isOpen).length, 0);
    const affected = groups.reduce((s,g) => s + g.affectedAccounts, 0);

    let badge, badgeClass;
    if (affected > 100 || knownIssues > 10) { badge = 'Critical'; badgeClass = 'critical'; }
    else if (affected > 30 || knownIssues > 5) { badge = 'Needs attention'; badgeClass = 'attention'; }
    else if (knownIssues > 0) { badge = 'Monitoring'; badgeClass = 'monitor'; }
    else { badge = 'All clear'; badgeClass = 'clear'; }

    const spark = sparkline(generateSparkData(p));

    return `
      <div class="product-card ${p} fade-up fade-up-${idx + 1}">
        <div class="strip"></div>
        <div class="pc-head">
          <div class="pc-title">${PRODUCT_LABELS[p]}</div>
          <span class="pc-badge ${badgeClass}">${badge}</span>
        </div>
        <div class="pc-metric">
          <div class="pc-big">${knownIssues}</div>
          <div class="pc-label">known issue${knownIssues === 1 ? '' : 's'}</div>
        </div>
        <div class="pc-row">
          <div class="pc-stat">Open tickets<strong>${openTickets}</strong></div>
          <div class="pc-stat">Affected accounts<strong>${affected.toLocaleString()}</strong></div>
          <svg class="pc-spark" viewBox="0 0 80 28" preserveAspectRatio="none">${spark}</svg>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('productGrid').innerHTML = html;
}

// crude deterministic sparkline based on current ticket distribution
function generateSparkData(productKey) {
  // 8 buckets — use day-of-week deltas of ticket creation if available
  const buckets = [0,0,0,0,0,0,0,0];
  groupedIssues
    .filter(g => g.product === productKey)
    .forEach(g => g.tickets.forEach(t => {
      if (!t.created) return;
      const age = ageDays(t);
      if (age === null || age > 56) return;
      const bucket = Math.min(7, Math.floor(age / 7));
      buckets[7 - bucket]++;
    }));
  return buckets;
}

function sparkline(data) {
  if (!data || !data.length) return '';
  const max = Math.max(1, ...data);
  const w = 80, h = 28, pad = 2;
  const dx = (w - pad*2) / (data.length - 1);
  const points = data.map((v, i) => {
    const x = pad + i * dx;
    const y = h - pad - ((v / max) * (h - pad*2));
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = `M ${points.join(' L ')}`;
  return `
    <path d="${path}" fill="none" stroke="#5378FC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${path} L ${w-pad},${h-pad} L ${pad},${h-pad} Z" fill="#5378FC" opacity="0.08"/>
  `;
}

function renderSummaryCards() {
  let inProg = 0, backlog = 0, resolved = 0;
  // ticket-level counts (not grouped) — but only from groups with >= 2 tickets
  const eligible = groupedIssues.filter(g => g.tickets.length >= 2);
  for (const g of eligible) {
    for (const t of g.tickets) {
      const cat = (t.statusCategory || '').toLowerCase();
      if (cat.includes('done')) resolved++;
      else if (cat.includes('progress')) inProg++;
      else backlog++;
    }
  }
  const html = `
    <div class="summary-card fade-up fade-up-4">
      <div class="summary-icon prog">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="summary-content">
        <div class="sc-label">In Progress</div>
        <div class="sc-num">${inProg}</div>
        <div class="sc-sub">Tickets actively being worked</div>
      </div>
    </div>
    <div class="summary-card fade-up fade-up-5">
      <div class="summary-icon todo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </div>
      <div class="summary-content">
        <div class="sc-label">Backlog</div>
        <div class="sc-num">${backlog}</div>
        <div class="sc-sub">Awaiting triage or development</div>
      </div>
    </div>
    <div class="summary-card fade-up fade-up-6">
      <div class="summary-icon done">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div class="summary-content">
        <div class="sc-label">Recently Resolved</div>
        <div class="sc-num">${resolved}</div>
        <div class="sc-sub">Closed across known issues</div>
      </div>

  `;
  document.getElementById('summaryGrid').innerHTML = html;
}

function ticketsForBoard(boardId) {
  const board = BOARDS.find(b => b.id === boardId);
  if (!board) return [];
  return groupedIssues.filter(g =>
    g.tickets.length >= 2 &&
    g.tickets.some(t => board.match(t)) &&
    g.tickets.some(isOpen)
  );
}

function renderTabs() {
  const html = BOARDS.map(b => {
    const groups = ticketsForBoard(b.id);
    const count = groups.length;
    // Critical if any open ticket on this board has P1 (or equivalent)
    const hasCritical = groups.some(g =>
      g.tickets.some(t => isOpen(t) && /^(P1|Highest|Critical)$/i.test(t.priority || ''))
    );
    return `
      <button class="tab ${b.id === activeTab ? 'active' : ''}" data-tab="${b.id}">
        ${escapeHtml(b.label)}
        <span class="count ${hasCritical && b.id !== 'all' ? 'critical' : ''}">${count}</span>
      </button>
    `;
  }).join('');
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = html;
  tabsEl.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      activeTab = t.dataset.tab;
      renderTabs();
      renderBoard();
    });
  });
}

function renderBoard() {
  const board = BOARDS.find(b => b.id === activeTab);
  const groups = ticketsForBoard(activeTab);
  const openTickets = groups.reduce((s,g) => s + g.tickets.filter(isOpen).length, 0);
  const affected = groups.reduce((s,g) => s + g.affectedAccounts, 0);

  // board health
  let healthClass, healthLabel;
  if (affected > 100 || groups.length > 10) { healthClass = 'critical'; healthLabel = 'Critical'; }
  else if (affected > 30 || groups.length > 5) { healthClass = 'attention'; healthLabel = 'Needs attention'; }
  else if (groups.length > 0) { healthClass = 'monitor'; healthLabel = 'Monitoring'; }
  else { healthClass = 'clear'; healthLabel = 'All clear'; }

  // resolved within last 14 days
  const recentResolved = [];
  groupedIssues.forEach(g => {
    if (!board.match) return;
    g.tickets.forEach(t => {
      if (!board.match(t)) return;
      const cat = (t.statusCategory || '').toLowerCase();
      if (!cat.includes('done')) return;
      const resolved = t.resolutiondate || t.updated;
      if (!resolved) return;
      const days = Math.floor((Date.now() - new Date(resolved).getTime()) / 86400000);
      if (days <= 14) recentResolved.push({ ...t, daysSince: days });
    });
  });
  recentResolved.sort((a,b) => a.daysSince - b.daysSince);

  const topIssue = groups[0];

  let html = `
    <div class="board-head">
      <div class="bh-left">
        <h2 class="bh-title">${escapeHtml(board.label)}</h2>
        <span class="pc-badge ${healthClass}">${healthLabel}</span>
        <div class="bh-meta">
          <span><strong>${groups.length}</strong> known issues</span>
          <span class="divider">·</span>
          <span><strong>${openTickets}</strong> open tickets</span>
          <span class="divider">·</span>
          <span><strong>${affected.toLocaleString()}</strong> affected accounts</span>
          <span class="divider">·</span>
          <span>Assignee: <strong>${escapeHtml(board.assignee)}</strong></span>
        </div>
      </div>
      <a href="${board.jiraUrl}" target="_blank" rel="noopener" class="btn-jira">
        Open in Jira
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg>
      </a>
    </div>
  `;

  // Incident communication block
  if (topIssue) {
    html += renderIncident(topIssue, board);
  }

  // Issues table
  html += renderIssuesTable(groups);

  // Recently resolved
  if (recentResolved.length > 0) {
    html += `
      <div class="resolved-card">
        <div class="issues-head">
          <h3>Recently Resolved (last 14 days)</h3>
          <span class="threshold-note">${recentResolved.length} ticket${recentResolved.length === 1 ? '' : 's'}</span>
        </div>
        <div class="resolved-grid">
          ${recentResolved.slice(0, 12).map(t => `
            <div class="resolved-item">
              <div class="ri-name">${escapeHtml(t.summary || 'Untitled')}</div>
              <div class="ri-meta">
                <a href="${tagForKey(t.key)}" target="_blank" rel="noopener" class="mono">${escapeHtml(t.key)}</a>
                <span>·</span>
                <span title="${formatCST(t.resolutiondate || t.updated)}">${t.daysSince === 0 ? 'today' : t.daysSince === 1 ? '1 day ago' : `${t.daysSince} days ago`}</span>
              </div>
              <div class="ri-timestamp">${formatCSTShort(t.resolutiondate || t.updated)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  document.getElementById('boardView').innerHTML = html;

  // Wire up copy buttons
  document.querySelectorAll('.btn-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.dataset.copy;
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerHTML;
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = original;
        }, 1800);
      });
    });
  });
}

function renderIncident(g, board) {
  const status = topStatusForGroup(g);
  const pillClass = statusPillClass(status.category);
  const open = g.tickets.filter(isOpen);
  // Use actual Jira priority from the highest-priority open ticket
  const prioOrder = { 'P1': 1, 'Highest': 1, 'Critical': 1, 'P2': 2, 'High': 2, 'P3': 3, 'Medium': 3, 'P4': 4, 'Low': 4, 'Lowest': 5 };
  const sortedByPrio = [...open].sort((a, b) => (prioOrder[a.priority] || 99) - (prioOrder[b.priority] || 99));
  const topPrio = sortedByPrio[0]?.priority || 'P3';
  const prioText = topPrio.startsWith('P') ? topPrio : (prioOrder[topPrio] ? `P${prioOrder[topPrio]}` : 'P3');
  const sevText = g.affectedAccounts > 50 ? 'High' : g.affectedAccounts > 10 ? 'Medium' : 'Low';

  const clientMsg = `We are aware of an issue affecting ${PRODUCT_LABELS[g.product] || 'your service'}: ${g.canonical}. Our engineering team is actively investigating and we will follow up with an update as soon as one is available. We appreciate your patience.`;

  const internalNotes = `Known issue across ${open.length} open ticket${open.length === 1 ? '' : 's'} on ${board.label}.
Approx. ${g.affectedAccounts.toLocaleString()} account${g.affectedAccounts === 1 ? '' : 's'} affected.
Current status: ${status.name}.
Ticket(s): ${open.slice(0, 5).map(t => t.key).join(', ')}${open.length > 5 ? `, +${open.length - 5} more` : ''}.`;

  const fullCopy = `*Incident: ${g.canonical}*
Priority: ${prioText}  |  Severity: ${sevText}  |  Status: ${status.name}
Affected accounts: ~${g.affectedAccounts.toLocaleString()}  |  Open tickets: ${open.length}

*Client-facing message*
${clientMsg}

*Internal notes*
${internalNotes}`;

  return `
    <div class="incident">
      <div class="incident-head">
        <div class="incident-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Top incident · ${escapeHtml(g.canonical)}
        </div>
        <button class="btn-copy" data-copy="${escapeHtml(fullCopy)}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy for Slack
        </button>
      </div>
      <div class="incident-body">
        <div class="incident-col">
          <div class="incident-meta">
            <div class="im-item"><div class="im-label">Priority</div><div class="im-val">${prioText}</div></div>
            <div class="im-item"><div class="im-label">Severity</div><div class="im-val">${sevText}</div></div>
            <div class="im-item"><div class="im-label">Status</div><div class="im-val"><span class="status-pill ${pillClass}">${escapeHtml(status.name)}</span></div></div>
            <div class="im-item"><div class="im-label">Affected accts</div><div class="im-val">~${g.affectedAccounts.toLocaleString()}</div></div>
          </div>
          <h4>Client-facing message</h4>
          <p>${escapeHtml(clientMsg)}</p>
        </div>
        <div class="incident-col">
          <h4>Internal notes</h4>
          <p>${escapeHtml(internalNotes)}</p>
        </div>
      </div>
    </div>
  `;
}

function renderIssuesTable(groups) {
  if (groups.length === 0) {
    return `
      <div class="issues-card">
        <div class="issues-head">
          <h3>Known issues on this board</h3>
          <span class="threshold-note">Groups with 2+ tickets only</span>
        </div>
        <div class="empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <div class="e-title">No active known issues</div>
          <div class="e-sub">All clear on this board.</div>
        </div>
      </div>
    `;
  }

  const rows = groups.map(g => {
    const status = topStatusForGroup(g);
    const pillClass = statusPillClass(status.category);
    const openTickets = g.tickets.filter(isOpen);
    const age = avgAge(g);
    const ageDisplay = age === null ? '—' : age === 0 ? 'today' : age === 1 ? '1d' : `${age}d`;

    // Determine top priority of any open ticket
    const prioOrder = { 'P1': 1, 'Highest': 1, 'Critical': 1, 'P2': 2, 'High': 2, 'P3': 3, 'Medium': 3, 'P4': 4, 'Low': 4, 'Lowest': 5 };
    const sortedByPrio = [...openTickets].sort((a, b) => (prioOrder[a.priority] || 99) - (prioOrder[b.priority] || 99));
    const topPrioRaw = sortedByPrio[0]?.priority || 'P3';
    const prioMap = { 'Highest': 'P1', 'Critical': 'P1', 'High': 'P2', 'Medium': 'P3', 'Low': 'P4', 'Lowest': 'P4' };
    const prio = prioMap[topPrioRaw] || topPrioRaw;
    const prioClass = (prio || 'P3').toLowerCase();

    // Oldest ticket created date for "first reported" tooltip
    const oldestTicket = openTickets.slice().sort((a, b) => new Date(a.created || 0) - new Date(b.created || 0))[0];
    const firstReported = oldestTicket ? formatCST(oldestTicket.created) : null;

    const keys = openTickets.slice(0, 4).map(t =>
      `<a href="${tagForKey(t.key)}" target="_blank" rel="noopener" class="issue-key-pill mono">${escapeHtml(t.key)}</a>`
    ).join('');
    const moreKeys = openTickets.length > 4 ? `<span class="issue-key-more mono">+${openTickets.length - 4}</span>` : '';

    return `
      <tr class="prio-${prioClass}">
        <td class="issue-main-cell">
          <div class="issue-name">${escapeHtml(g.canonical)}</div>
          ${g.brief ? `<div class="issue-brief">${escapeHtml(g.brief)}</div>` : ''}
          <div class="issue-keys">${keys}${moreKeys}</div>
          <span class="row-hover-hint">View in Jira <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg></span>
        </td>
        <td data-label="Priority"><span class="prio-pill ${prioClass}">${escapeHtml(prio)}</span></td>
        <td data-label="Product"><span class="prod-pill ${g.product}">${PRODUCT_LABELS[g.product]}</span></td>
        <td data-label="Status"><span class="status-pill ${pillClass}">${escapeHtml(status.name)}</span></td>
        <td data-label="Affected">
          <div class="affected-num">${g.affectedAccounts.toLocaleString()}</div>
          <div class="affected-label">${g.affectedAccounts === 1 ? 'account' : 'accounts'}</div>
        </td>
        <td data-label="Tickets"><span class="ticket-count">${openTickets.length}</span></td>
        <td data-label="Avg age" class="age-cell"${firstReported ? ` title="First reported: ${firstReported}"` : ''}>${ageDisplay}</td>
      </tr>
    `;
  }).join('');

  return `
    <div class="issues-card">
      <div class="issues-head">
        <h3>Known issues on this board</h3>
        <span class="threshold-note">Showing groups with 2+ open tickets · Sorted by affected accounts</span>
      </div>
      <table class="issues-table">
        <thead>
          <tr>
            <th style="width:38%">Issue</th>
            <th>Priority</th>
            <th>Product</th>
            <th>Status</th>
            <th>Affected</th>
            <th>Tickets</th>
            <th>Avg age</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function setupSearch() {
  const input = document.getElementById('search');
  const results = document.getElementById('searchResults');

  function runSearch(q) {
    if (!q || q.length < 2) {
      results.classList.remove('show');
      results.innerHTML = '';
      return;
    }
    const ql = q.toLowerCase();
    const matches = [];

    // groups first (by canonical name)
    for (const g of groupedIssues) {
      if (matches.length >= 12) break;
      if (g.canonical.toLowerCase().includes(ql) || (g.brief || '').toLowerCase().includes(ql)) {
        const first = g.tickets[0];
        matches.push({
          type: 'group',
          title: g.canonical,
          meta: `${g.tickets.length} tickets · ${PRODUCT_LABELS[g.product]} · ${g.affectedAccounts} affected`,
          key: first?.key || '',
          link: first ? tagForKey(first.key) : '#'
        });
      }
    }
    // individual tickets (by key, summary, brief)
    const items = rawData && (rawData.issues || rawData.tickets);
    if (items) {
      for (const t of items) {
        if (matches.length >= 20) break;
        const hay = `${t.key} ${t.summary || ''} ${t.brief || ''}`.toLowerCase();
        if (hay.includes(ql)) {
          // skip if already covered by a group match for same canonical
          if (matches.some(m => m.key === t.key)) continue;
          matches.push({
            type: 'ticket',
            title: t.summary || '(no summary)',
            meta: `${t.status || 'Open'} · ${t.project || '—'}`,
            key: t.key,
            link: tagForKey(t.key)
          });
        }
      }
    }

    if (!matches.length) {
      results.innerHTML = `<div class="search-result" style="cursor:default;color:var(--text-faint);">No matches for "${escapeHtml(q)}"</div>`;
      results.classList.add('show');
      return;
    }

    results.innerHTML = matches.map(m => `
      <a class="search-result" href="${m.link}" target="_blank" rel="noopener" style="display:block;text-decoration:none;">
        <div class="sr-key">${escapeHtml(m.key)}</div>
        <div class="sr-summary">${escapeHtml(m.title)}</div>
        <div class="sr-meta">${escapeHtml(m.meta)}</div>
      </a>
    `).join('');
    results.classList.add('show');
  }

  let timer;
  input.addEventListener('input', e => {
    clearTimeout(timer);
    timer = setTimeout(() => runSearch(e.target.value.trim()), 120);
  });
  input.addEventListener('focus', e => {
    if (e.target.value.trim().length >= 2) runSearch(e.target.value.trim());
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) results.classList.remove('show');
  });
}

document.getElementById('refreshBtn').addEventListener('click', async () => {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await loadData(true);
  setTimeout(() => btn.classList.remove('spinning'), 600);
});

// ---------------------------------------------------------
// BACK-TO-TOP BUTTON
// ---------------------------------------------------------
(function setupScrollTop() {
  const btn = document.getElementById('scrollTop');
  if (!btn) return;
  const onScroll = () => {
    if (window.scrollY > 200) btn.classList.add('show');
    else btn.classList.remove('show');
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  // Re-check after data loads + on resize, in case page becomes scrollable later
  window.addEventListener('resize', onScroll);
  setTimeout(onScroll, 800);
  setTimeout(onScroll, 2000);
})();

// ---------------------------------------------------------
setupSearch();
loadData();

// auto-update "last synced" label every minute
setInterval(updateLastSync, 60000);
